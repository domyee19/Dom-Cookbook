<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Cookbook">
<meta name="theme-color" content="#1a1612">
<title>My Cookbook</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#FAF6F1;--bg-card:#FFF;--text:#1a1612;--text-muted:#8a7e74;--accent:#C4623A;--accent-light:#E8DDD4;--accent-hover:#A84E2B;--border:#E8E0D8;--shadow:0 2px 16px rgba(26,22,18,.06);--radius:16px;--serif:'Playfair Display',Georgia,serif;--sans:'DM Sans',-apple-system,sans-serif;--tab-height:64px;--green:#5a7a64;--green-bg:rgba(90,122,100,.08)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100dvh;overscroll-behavior:none}

/* Header */
.header{padding:60px 24px 20px;position:sticky;top:0;z-index:100;background:var(--bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.header-row{display:flex;justify-content:space-between;align-items:center}
.header h1{font-family:var(--serif);font-size:28px;font-weight:700;letter-spacing:-.5px}
.header h1 em{color:var(--accent);font-style:normal}
.header .subtitle{font-size:13px;color:var(--text-muted);margin-top:2px;font-weight:300;letter-spacing:.3px}
.add-btn{width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(196,98,58,.3);transition:transform .2s}
.add-btn:active{transform:scale(.92)}

/* Tab Bar */
.tab-bar{position:fixed;bottom:0;left:0;right:0;height:var(--tab-height);padding-bottom:env(safe-area-inset-bottom,0);background:var(--bg-card);border-top:1px solid var(--border);display:flex;justify-content:center;z-index:150}
.tab-btn{flex:1;max-width:140px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--text-muted);font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:.2px;transition:color .2s;padding:8px 0}
.tab-btn.active{color:var(--accent)}
.tab-btn svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tab-btn.active svg{stroke-width:2.2}
.view{display:none}.view.active{display:block}

/* Filters */
.filter-toggle{display:flex;gap:0;margin:12px 24px 0;background:var(--bg-card);border-radius:10px;border:1.5px solid var(--border);overflow:hidden;width:fit-content}
.filter-toggle button{padding:6px 14px;border:none;background:transparent;font-family:var(--sans);font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .2s}
.filter-toggle button.active{background:var(--text);color:#fff}
.filters{display:flex;gap:8px;padding:12px 24px 8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.pill{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;white-space:nowrap;transition:all .2s}
.pill.active{background:var(--text);color:#fff;border-color:var(--text)}

/* Grid */
.grid{padding:16px 24px 100px;display:flex;flex-direction:column;gap:20px}
.dish-card{background:var(--bg-card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:transform .25s;animation:fadeUp .4s ease both;position:relative}
.dish-card:active{transform:scale(.98)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.dish-card .photo{width:100%;aspect-ratio:16/10;object-fit:cover;display:block;background:var(--accent-light)}
.dish-card .photo-placeholder{width:100%;aspect-ratio:16/10;background:linear-gradient(135deg,var(--accent-light),#f0e6dc);display:flex;align-items:center;justify-content:center;font-size:40px;opacity:.6}
.dish-card .info{padding:16px 18px 18px}
.dish-card .dish-tags{display:flex;gap:6px;align-items:center;margin-bottom:4px;flex-wrap:wrap}
.dish-card .tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:3px 8px;border-radius:6px;line-height:1}
.dish-card .tag-meal{color:var(--accent);background:rgba(196,98,58,.08)}
.dish-card .tag-cat{color:var(--green);background:var(--green-bg)}
.dish-card .dish-name{font-family:var(--serif);font-size:20px;font-weight:700;line-height:1.3}
.dish-card .dish-date{font-size:12px;color:var(--text-muted);margin-top:6px;font-weight:300}
.cook-count-badge{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.55);color:#fff;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.card-photo-wrap{position:relative}
.card-photo-strip{position:absolute;bottom:10px;left:12px;display:flex;gap:0}
.card-photo-strip img{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--bg-card);margin-left:-8px;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.card-photo-strip img:first-child{margin-left:0}
.empty{text-align:center;padding:80px 40px;animation:fadeUp .6s ease both}
.empty-icon{font-size:56px;margin-bottom:16px}
.empty h2{font-family:var(--serif);font-size:22px;margin-bottom:8px}
.empty p{color:var(--text-muted);font-size:14px;line-height:1.6;font-weight:300}

/* Calendar */
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px 8px}
.cal-header .cal-title{font-family:var(--serif);font-size:20px;font-weight:700}
.cal-nav{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg-card);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--text);transition:background .15s}
.cal-nav:active{background:var(--accent-light)}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);padding:8px 12px 4px;text-align:center}
.cal-weekdays span{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:4px 8px 120px}
.cal-day{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:4px;position:relative;overflow:hidden;cursor:default}
.cal-day.empty{opacity:0;pointer-events:none}
.cal-day .day-num{font-size:11px;font-weight:500;color:var(--text-muted);z-index:2;line-height:1}
.cal-day.today .day-num{color:#fff}
.cal-day.today::before{content:'';position:absolute;top:1px;width:19px;height:19px;border-radius:50%;background:var(--accent);z-index:1}
.cal-day.has-dishes{cursor:pointer;background:rgba(196,98,58,.04)}
.cal-day.has-dishes:active{background:var(--accent-light)}
.cal-thumbs{display:flex;flex-wrap:wrap;gap:1px;justify-content:center;margin-top:2px;z-index:2;width:100%;padding:0 2px}
.cal-thumb{width:13px;height:13px;border-radius:3px;object-fit:cover;display:block}
.cal-thumb-emoji{width:13px;height:13px;font-size:9px;display:flex;align-items:center;justify-content:center;background:var(--accent-light);border-radius:3px}
.cal-more{font-size:7px;font-weight:700;color:var(--accent);margin-top:1px;z-index:2}

/* Search */
.search-bar{padding:12px 24px 0}
.search-input-wrap{position:relative}
.search-input-wrap svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:var(--text-muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
.search-input{width:100%;padding:14px 16px 14px 44px;border:1.5px solid var(--border);border-radius:14px;font-family:var(--sans);font-size:15px;color:var(--text);background:var(--bg-card);outline:none;transition:border-color .2s;-webkit-appearance:none}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:#c0b8b0}
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;border:none;background:var(--border);color:var(--text-muted);font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center}
.search-clear.show{display:flex}
.search-results{padding:16px 24px 100px}
.search-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;animation:fadeUp .25s ease both}
.search-row:last-child{border-bottom:none}
.search-row:active{opacity:.7}
.search-row-thumb{width:48px;height:48px;border-radius:10px;object-fit:cover;flex-shrink:0}
.search-row-thumb-empty{width:48px;height:48px;border-radius:10px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.search-row-info{flex:1;min-width:0}
.search-row-info .sr-name{font-family:var(--serif);font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-row-info .sr-meta{font-size:11px;color:var(--text-muted);margin-top:2px}
.search-row-info .sr-match{font-size:11px;color:var(--accent);font-weight:500;margin-top:1px}
.search-empty{text-align:center;padding:60px 40px}
.search-empty-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.search-empty p{color:var(--text-muted);font-size:14px;font-weight:300;line-height:1.5}

/* Panels & Modals */
.overlay{position:fixed;inset:0;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);background:rgba(26,22,18,.4);display:none;align-items:flex-end;justify-content:center;opacity:0;transition:opacity .3s}
.overlay.open{display:flex;opacity:1}
.sheet{background:var(--bg);width:100%;max-width:500px;border-radius:24px 24px 0 0;overflow-y:auto;padding:8px 24px 40px;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);-webkit-overflow-scrolling:touch}
.overlay.open .sheet{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:4px;margin:8px auto 12px}
.sheet-top{display:flex;justify-content:flex-end;margin-bottom:8px}
.sheet-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--border);color:var(--text-muted);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.sheet-close:active{background:#d4ccc4}
.modal-title{font-family:var(--serif);font-size:24px;font-weight:700;margin-bottom:24px}

/* Choice Sheet */
.choice-sheet .sheet{max-height:50dvh}
.choice-sheet{z-index:240}
.choice-btn{display:flex;align-items:center;gap:16px;padding:18px 16px;border:1.5px solid var(--border);border-radius:14px;background:var(--bg-card);cursor:pointer;width:100%;margin-bottom:10px;transition:border-color .15s}
.choice-btn:active{border-color:var(--accent);background:var(--accent-light)}
.choice-icon{font-size:28px;flex-shrink:0}
.choice-text{text-align:left}
.choice-text .ct-title{font-family:var(--serif);font-size:17px;font-weight:700}
.choice-text .ct-desc{font-size:13px;color:var(--text-muted);font-weight:300;margin-top:2px}

/* Cook Again Picker */
.cook-picker{z-index:245}
.cook-picker .sheet{max-height:85dvh}
.picker-search{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:12px;font-family:var(--sans);font-size:15px;color:var(--text);background:var(--bg-card);outline:none;margin-bottom:12px;-webkit-appearance:none}
.picker-search:focus{border-color:var(--accent)}
.picker-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer}
.picker-row:last-child{border-bottom:none}
.picker-row:active{opacity:.7}
.picker-thumb{width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0}
.picker-thumb-empty{width:44px;height:44px;border-radius:10px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.picker-info{flex:1;min-width:0}
.picker-info .pi-name{font-family:var(--serif);font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.picker-info .pi-meta{font-size:11px;color:var(--text-muted)}

/* Cook Again Form */
.cook-form{z-index:250}
.cook-form .sheet{max-height:90dvh}
.cook-form-dish{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg-card);border-radius:12px;border:1.5px solid var(--border);margin-bottom:20px}
.cook-form-dish .cfd-name{font-family:var(--serif);font-size:16px;font-weight:700}
.cook-form-dish .cfd-meta{font-size:11px;color:var(--text-muted)}

/* Main Add/Edit Modal */
.main-modal{z-index:250}
.main-modal .sheet{max-height:92dvh}

/* Form Fields */
.field{margin-bottom:20px}
.field label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:8px}
.field input[type="text"],.field input[type="date"],.field textarea,.field select{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:12px;font-family:var(--sans);font-size:15px;color:var(--text);background:var(--bg-card);outline:none;transition:border-color .2s;-webkit-appearance:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
.field textarea{min-height:90px;resize:vertical;line-height:1.6}
.field select{background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%238a7e74' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 16px center;padding-right:40px}
.photo-upload{width:100%;aspect-ratio:16/10;border:2px dashed var(--border);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;background:var(--bg-card);transition:border-color .2s}
.photo-upload:active{border-color:var(--accent)}
.photo-upload .upload-icon{font-size:28px;margin-bottom:6px;opacity:.5}
.photo-upload .upload-text{font-size:13px;color:var(--text-muted);font-weight:400}
.photo-upload img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.photo-upload .remove-photo{position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5}

/* List Builder */
.list-builder{display:flex;flex-direction:column;gap:8px}
.list-row{display:flex;align-items:center;gap:8px;animation:rowIn .2s ease both}
@keyframes rowIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.list-row .row-handle{flex-shrink:0;width:24px;text-align:center;font-size:13px;font-weight:600;color:var(--text-muted);user-select:none}
.list-row .row-handle .dot{color:var(--accent);font-size:20px;line-height:1}
.list-row input{flex:1;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:var(--sans);font-size:14px;color:var(--text);background:var(--bg-card);outline:none;transition:border-color .2s;-webkit-appearance:none;min-width:0}
.list-row input:focus{border-color:var(--accent)}
.list-row input::placeholder{color:#c0b8b0}
.row-delete{flex-shrink:0;width:30px;height:30px;border-radius:50%;border:none;background:transparent;color:#c0b8b0;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .15s,background .15s}
.row-delete:active{background:#fde8e4;color:#c0392b}
.list-add-btn{display:flex;align-items:center;gap:6px;padding:10px 0;border:none;background:none;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--accent);cursor:pointer;transition:opacity .15s;margin-top:2px}
.list-add-btn:active{opacity:.6}
.list-add-btn .plus-circle{width:22px;height:22px;border-radius:50%;border:1.5px dashed var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px}

/* Buttons */
.btn-primary{width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:background .2s,transform .15s}
.btn-primary:active{transform:scale(.98);background:var(--accent-hover)}
.btn-danger{width:100%;padding:14px;background:transparent;color:#c0392b;border:1.5px solid #e8d0cd;border-radius:14px;font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;margin-top:10px}
.btn-danger:active{background:#fdf2f0}

/* Detail */
.detail-view{position:fixed;inset:0;background:var(--bg);z-index:300;overflow-y:auto;display:none;-webkit-overflow-scrolling:touch}
.detail-view.open{display:block;animation:fadeUp .3s ease}
.detail-back,.detail-edit{position:fixed;top:50px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:none;cursor:pointer;z-index:310;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
.detail-back{left:16px;font-size:20px}.detail-edit{right:16px;font-size:18px}
.detail-hero{width:100%;aspect-ratio:16/11;object-fit:cover;display:block}
.detail-hero-placeholder{width:100%;aspect-ratio:16/11;background:linear-gradient(135deg,var(--accent-light),#f0e6dc);display:flex;align-items:center;justify-content:center;font-size:64px;opacity:.5}
.detail-body{padding:28px 24px 60px}
.detail-tags{display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.detail-tags .dtag{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:4px 10px;border-radius:8px;line-height:1}
.detail-tags .dtag-meal{color:var(--accent);background:rgba(196,98,58,.08)}
.detail-tags .dtag-cat{color:var(--green);background:var(--green-bg)}
.detail-body .dish-name{font-family:var(--serif);font-size:28px;font-weight:700;line-height:1.25;margin-bottom:6px}
.detail-body .dish-meta{font-size:13px;color:var(--text-muted);font-weight:300;margin-bottom:28px}
.section-heading{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:12px}
.section-heading:not(:first-of-type){margin-top:28px}
.detail-ingredients{list-style:none;padding:0}
.detail-ingredients li{padding:7px 0;font-size:15px;font-weight:300;line-height:1.4;display:flex;align-items:baseline;gap:10px;border-bottom:1px solid rgba(232,224,216,.5)}
.detail-ingredients li:last-child{border-bottom:none}
.detail-ingredients li::before{content:'';flex-shrink:0;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-top:6px}
.detail-steps{list-style:none;padding:0;counter-reset:step}
.detail-steps li{padding:10px 0;font-size:15px;font-weight:300;line-height:1.6;display:flex;gap:14px;counter-increment:step}
.detail-steps li::before{content:counter(step);flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--accent-light);color:var(--accent);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px}

/* Cook Log */
.cook-log{margin-top:28px}
.cook-log-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .15s}
.cook-log-row:last-child{border-bottom:none}
.cook-log-row:active{opacity:.6}
.cook-log-row .clr-thumb{width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0}
.cook-log-row .clr-thumb-empty{width:44px;height:44px;border-radius:10px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;color:var(--text-muted)}
.cook-log-row .clr-info{flex:1;min-width:0}
.cook-log-row .clr-date{font-family:var(--serif);font-size:15px;font-weight:700}
.cook-log-row .clr-preview{font-size:12px;color:var(--text-muted);font-weight:300;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.cook-log-row .clr-arrow{color:var(--border);font-size:18px;flex-shrink:0}

/* Cook Log Detail Panel */
.cook-detail{z-index:320}
.cook-detail .sheet{max-height:85dvh}
.cook-detail-date{font-family:var(--serif);font-size:22px;font-weight:700;margin-bottom:20px}
.cook-detail-photo{width:100%;aspect-ratio:16/10;object-fit:cover;border-radius:14px;display:block;margin-bottom:16px}
.cook-detail-notes-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:8px}
.cook-detail-notes{font-size:15px;line-height:1.7;font-weight:300;white-space:pre-wrap;background:var(--accent-light);border-radius:12px;padding:16px 18px}
.cook-detail-empty{color:var(--text-muted);font-style:italic;font-size:14px}

/* Day panel */
.day-panel{z-index:200}.day-panel .sheet{max-height:70dvh}
.day-panel-title{font-family:var(--serif);font-size:20px;font-weight:700;margin-bottom:16px}
.day-dish-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer}
.day-dish-row:last-child{border-bottom:none}
.day-dish-row:active{opacity:.7}
.day-dish-thumb{width:52px;height:52px;border-radius:10px;object-fit:cover;flex-shrink:0}
.day-dish-thumb-empty{width:52px;height:52px;border-radius:10px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.day-dish-info{flex:1;min-width:0}
.day-dish-info .d-type{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--accent)}
.day-dish-info .d-name{font-family:var(--serif);font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.no-recipe{color:var(--text-muted);font-style:italic;font-size:14px}
@media(min-width:600px){.header,.filter-toggle,.filters,.grid,.cal-header,.cal-weekdays,.cal-grid,.search-bar,.search-results{max-width:520px;margin-left:auto;margin-right:auto}.sheet{border-radius:24px;margin-bottom:20px}}
</style>
</head>
<body>

<div class="header"><div class="header-row"><div><h1>My <em>Cookbook</em></h1><div class="subtitle" id="dishCount">0 dishes</div></div><button class="add-btn" onclick="showChoice()">+</button></div></div>

<div class="view active" id="viewDishes"><div class="filter-toggle" id="filterToggle"><button class="active" onclick="setFilterMode('meal')">Meal</button><button onclick="setFilterMode('category')">Category</button></div><div class="filters" id="filters"></div><div class="grid" id="grid"></div></div>

<div class="view" id="viewCalendar"><div class="cal-header"><button class="cal-nav" onclick="calPrev()">&#8249;</button><div class="cal-title" id="calTitle"></div><button class="cal-nav" onclick="calNext()">&#8250;</button></div><div class="cal-weekdays"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div><div class="cal-grid" id="calGrid"></div></div>

<div class="view" id="viewSearch"><div class="search-bar"><div class="search-input-wrap"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><input class="search-input" id="searchInput" type="text" placeholder="Search dishes, ingredients…" oninput="runSearch()"><button class="search-clear" id="searchClear" onclick="clearSearch()">&#x2715;</button></div></div><div class="search-results" id="searchResults"><div class="search-empty"><div class="search-empty-icon">&#x1F50D;</div><p>Search by dish name, category,<br>ingredients, or meal type</p></div></div></div>

<!-- Choice Sheet -->
<div class="overlay choice-sheet" id="choiceOverlay" onclick="if(event.target===this)closeOverlay('choiceOverlay')"><div class="sheet"><div class="modal-handle"></div><div class="sheet-top"><button class="sheet-close" onclick="closeOverlay('choiceOverlay')">&#x2715;</button></div><div class="modal-title">Add to Cookbook</div><button class="choice-btn" onclick="closeOverlay('choiceOverlay');setTimeout(openAddModal,400)"><div class="choice-icon">&#x1F4DD;</div><div class="choice-text"><div class="ct-title">New Dish</div><div class="ct-desc">Create a brand new recipe</div></div></button><button class="choice-btn" onclick="closeOverlay('choiceOverlay');setTimeout(openCookPicker,400)"><div class="choice-icon">&#x1F504;</div><div class="choice-text"><div class="ct-title">Cook Again</div><div class="ct-desc">Log another cook of an existing dish</div></div></button></div></div>

<!-- Cook Again Picker -->
<div class="overlay cook-picker" id="cookPickerOverlay" onclick="if(event.target===this)closeOverlay('cookPickerOverlay')"><div class="sheet"><div class="modal-handle"></div><div class="sheet-top"><button class="sheet-close" onclick="goBack('cookPickerOverlay')">&#x2715;</button></div><div class="modal-title">Which dish?</div><input class="picker-search" id="pickerSearch" type="text" placeholder="Search your dishes…" oninput="renderPicker()"><div id="pickerList"></div></div></div>

<!-- Cook Again Form -->
<div class="overlay cook-form" id="cookFormOverlay" onclick="if(event.target===this)closeOverlay('cookFormOverlay')"><div class="sheet"><div class="modal-handle"></div><div class="sheet-top"><button class="sheet-close" onclick="goBack('cookFormOverlay')">&#x2715;</button></div><div class="modal-title">Log a Cook</div><div class="cook-form-dish" id="cookFormDish"></div><div class="field"><label>Photo</label><div class="photo-upload" id="cookPhotoUpload" onclick="document.getElementById('cookPhotoInput').click()"><div class="upload-icon">&#x1F4F7;</div><div class="upload-text">Tap to add a photo</div></div><input type="file" id="cookPhotoInput" accept="image/*" style="display:none" onchange="handleCookPhoto(this)"></div><div class="field"><label>Date Cooked</label><input type="date" id="cookDate"></div><div class="field"><label>Ingredients</label><div class="list-builder" id="cookIngredientsList"></div><button class="list-add-btn" type="button" onclick="addIngRow('cookIngredientsList')"><span class="plus-circle">+</span> Add ingredient</button></div><div class="field"><label>Steps</label><div class="list-builder" id="cookStepsList"></div><button class="list-add-btn" type="button" onclick="addStpRow('cookStepsList')"><span class="plus-circle">+</span> Add step</button></div><div class="field"><label>Notes</label><textarea id="cookNotes" placeholder="How did it turn out this time?"></textarea></div><button class="btn-primary" onclick="saveCookAgain()">Save Cook</button></div></div>

<!-- Main Add/Edit Modal -->
<div class="overlay main-modal" id="modalOverlay" onclick="if(event.target===this)closeOverlay('modalOverlay')"><div class="sheet"><div class="modal-handle"></div><div class="sheet-top"><button class="sheet-close" onclick="goBack('modalOverlay')">&#x2715;</button></div><div class="modal-title" id="modalTitle">New Dish</div><div class="field cook-only"><label>Photo</label><div class="photo-upload" id="photoUpload" onclick="document.getElementById('photoInput').click()"><div class="upload-icon">&#x1F4F7;</div><div class="upload-text">Tap to add a photo</div></div><input type="file" id="photoInput" accept="image/*" style="display:none" onchange="handlePhoto(this)"></div><div class="field"><label>Dish Name</label><input type="text" id="dishName" placeholder="e.g. Pasta Carbonara"></div><div class="field"><label>Meal</label><select id="dishType"><option value="">Select a meal…</option><option value="Breakfast">Breakfast</option><option value="Lunch">Lunch</option><option value="Dinner">Dinner</option><option value="Appetizer">Appetizer</option><option value="Dessert">Dessert</option><option value="Snack">Snack</option><option value="Drink">Drink</option><option value="Side Dish">Side Dish</option><option value="Sauce">Sauce</option><option value="Other">Other</option></select></div><div class="field"><label>Category</label><select id="dishCategory"><option value="">Select a category…</option><option value="Pasta">Pasta</option><option value="Pizza">Pizza</option><option value="Sandwich">Sandwich</option><option value="Burger">Burger</option><option value="Meats">Meats</option><option value="Chicken">Chicken</option><option value="Seafood">Seafood</option><option value="Soup">Soup</option><option value="Stew">Stew</option><option value="Salad">Salad</option><option value="Stir Fry">Stir Fry</option><option value="Curry">Curry</option><option value="Tacos">Tacos</option><option value="Rice Bowl">Rice Bowl</option><option value="Eggs">Eggs</option><option value="Baked Goods">Baked Goods</option><option value="Cocktail">Cocktail</option><option value="Roasted Veg">Roasted Veg</option><option value="Other">Other</option></select></div><div class="field cook-only"><label>Date Cooked</label><input type="date" id="dishDate"></div><div class="field"><label>Ingredients</label><div class="list-builder" id="ingredientsList"></div><button class="list-add-btn" type="button" onclick="addIngredientRow()"><span class="plus-circle">+</span> Add ingredient</button></div><div class="field"><label>Steps</label><div class="list-builder" id="stepsList"></div><button class="list-add-btn" type="button" onclick="addStepRow()"><span class="plus-circle">+</span> Add step</button></div><div class="field cook-only"><label>Notes</label><textarea id="dishNotes" placeholder="Any thoughts, tweaks, or things to remember…"></textarea></div><button class="btn-primary" id="saveBtn" onclick="saveDish()">Save Dish</button><button class="btn-danger" id="deleteBtn" style="display:none" onclick="deleteDish()">Delete Dish</button></div></div>

<!-- Day Panel -->
<div class="overlay day-panel" id="dayPanelOverlay" onclick="if(event.target===this)closeOverlay('dayPanelOverlay')"><div class="sheet"><div class="modal-handle"></div><div class="sheet-top"><button class="sheet-close" onclick="closeOverlay('dayPanelOverlay')">&#x2715;</button></div><div class="day-panel-title" id="dayPanelTitle"></div><div id="dayPanelList"></div></div></div>

<!-- Cook Detail Panel -->
<div class="overlay cook-detail" id="cookDetailOverlay" onclick="if(event.target===this)closeOverlay('cookDetailOverlay')"><div class="sheet"><div class="modal-handle"></div><div class="sheet-top"><button class="sheet-close" onclick="closeOverlay('cookDetailOverlay')">&#x2715;</button></div><div id="cookDetailContent"></div></div></div>

<!-- Detail View -->
<div class="detail-view" id="detailView"><button class="detail-back" onclick="closeDetail()">&#8592;</button><button class="detail-edit" id="detailEditBtn">&#x270E;</button><div id="detailContent"></div></div>

<!-- Tab Bar -->
<div class="tab-bar"><button class="tab-btn active" id="tabDishes" onclick="switchTab('dishes')"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>Dishes</button><button class="tab-btn" id="tabSearch" onclick="switchTab('search')"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" fill="none"/><path d="M21 21l-4.35-4.35"/></svg>Search</button><button class="tab-btn" id="tabCalendar" onclick="switchTab('calendar')"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Calendar</button></div>

<script>
var dishes=[],editingId=null,currentPhoto=null,activeFilter='All',filterMode='meal',currentTab='dishes';
var cookAgainId=null,cookAgainPhoto=null;
var calYear,calMonth;
var STORAGE_KEY='cookbook_dishes';
var now=new Date();calYear=now.getFullYear();calMonth=now.getMonth();

function loadDishes(){try{dishes=JSON.parse(localStorage.getItem(STORAGE_KEY))||[];}catch{dishes=[];}migrateDishes();}
function saveDishesLS(){localStorage.setItem(STORAGE_KEY,JSON.stringify(dishes));}
function migrateDishes(){
  var changed=false;
  dishes.forEach(function(d){
    if(!d.cookLog){
      d.cookLog=[{id:crypto.randomUUID(),date:d.cookedDate||'',photo:d.photo||null,notes:d.notes||''}];
      delete d.cookedDate;delete d.photo;delete d.notes;
      changed=true;
    }
  });
  if(changed)saveDishesLS();
}
function latestCook(d){return d.cookLog&&d.cookLog.length?d.cookLog[d.cookLog.length-1]:null;}
function latestPhoto(d){for(var i=d.cookLog.length-1;i>=0;i--){if(d.cookLog[i].photo)return d.cookLog[i].photo;}return null;}
function latestDate(d){for(var i=d.cookLog.length-1;i>=0;i--){if(d.cookLog[i].date)return d.cookLog[i].date;}return'';}
function allDates(d){return d.cookLog.map(function(c){return c.date;}).filter(Boolean);}

// Helpers
function typeEmoji(t){return{Breakfast:'\u{1F95E}',Lunch:'\u{1F957}',Dinner:'\u{1F35D}',Appetizer:'\u{1F9C6}',Dessert:'\u{1F370}',Snack:'\u{1F37F}',Drink:'\u{1F964}','Side Dish':'\u{1F966}',Sauce:'\u{1FAD9}',Other:'\u{1F37D}\uFE0F'}[t]||'\u{1F37D}\uFE0F';}
function formatDate(s){if(!s)return'';var p=s.split('-').map(Number);return new Date(p[0],p[1]-1,p[2]).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});}
function escHtml(s){var e=document.createElement('span');e.textContent=s;return e.innerHTML.replace(/"/g,'&quot;');}
function todayStr(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

// Overlay helpers
function openOverlay(id){var o=document.getElementById(id);o.style.display='flex';requestAnimationFrame(function(){o.classList.add('open');});}
function closeOverlay(id){var o=document.getElementById(id);o.classList.remove('open');setTimeout(function(){o.style.display='none';},350);}
function goBack(id){
  closeOverlay(id);
  setTimeout(function(){
    if(id==='cookPickerOverlay')openOverlay('choiceOverlay');
    else if(id==='cookFormOverlay')openCookPicker();
    else if(id==='modalOverlay'&&!editingId)openOverlay('choiceOverlay');
  },400);
}

// List builders (generalized)
function addIngRow(listId,v){v=v||'';var l=document.getElementById(listId);var r=document.createElement('div');r.className='list-row';r.innerHTML='<div class="row-handle"><span class="dot">\u2022</span></div><input type="text" placeholder="e.g. 2 cups flour" value="'+escHtml(v)+'"><button class="row-delete" type="button" onclick="removeRow(this)">\u00d7</button>';l.appendChild(r);if(!v)r.querySelector('input').focus();r.querySelector('input').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();addIngRow(listId);}});}
function addStpRow(listId,v){v=v||'';var l=document.getElementById(listId);var n=l.children.length+1;var r=document.createElement('div');r.className='list-row';r.innerHTML='<div class="row-handle">'+n+'</div><input type="text" placeholder="Describe this step\u2026" value="'+escHtml(v)+'"><button class="row-delete" type="button" onclick="removeRow(this,true,\''+listId+'\')">\u00d7</button>';l.appendChild(r);if(!v)r.querySelector('input').focus();r.querySelector('input').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();addStpRow(listId);}});}
function addIngredientRow(v){addIngRow('ingredientsList',v);}
function addStepRow(v){addStpRow('stepsList',v);}
function removeRow(b,s,listId){var r=b.closest('.list-row');r.style.opacity='0';r.style.transform='translateX(20px)';r.style.transition='all .2s';setTimeout(function(){r.remove();if(s)renumberStepsIn(listId||'stepsList');},200);}
function renumberStepsIn(listId){document.getElementById(listId).querySelectorAll('.list-row').forEach(function(r,i){r.querySelector('.row-handle').textContent=i+1;});}
function renumberSteps(){renumberStepsIn('stepsList');}
function getListValues(listId){return Array.from(document.getElementById(listId).querySelectorAll('input')).map(function(i){return i.value.trim();}).filter(Boolean);}
function getIngredients(){return getListValues('ingredientsList');}
function getSteps(){return getListValues('stepsList');}
function populateList(listId,arr,isSteps){document.getElementById(listId).innerHTML='';if(arr&&arr.length)arr.forEach(function(v){isSteps?addStpRow(listId,v):addIngRow(listId,v);});else{isSteps?addStpRow(listId):addIngRow(listId);}}
function populateIngredients(a){populateList('ingredientsList',a,false);}
function populateSteps(a){populateList('stepsList',a,true);}

// Tabs
function switchTab(t){currentTab=t;['dishes','search','calendar'].forEach(function(v){var el=document.getElementById('view'+v.charAt(0).toUpperCase()+v.slice(1));if(el)el.classList.toggle('active',v===t);var btn=document.getElementById('tab'+v.charAt(0).toUpperCase()+v.slice(1));if(btn)btn.classList.toggle('active',v===t);});if(t==='calendar')renderCalendar();if(t==='search')document.getElementById('searchInput').focus();}

// Choice Sheet
function showChoice(){if(!dishes.length){openAddModal();return;}openOverlay('choiceOverlay');}

// Cook Again Picker
function openCookPicker(){document.getElementById('pickerSearch').value='';renderPicker();openOverlay('cookPickerOverlay');setTimeout(function(){document.getElementById('pickerSearch').focus();},400);}
function renderPicker(){var q=(document.getElementById('pickerSearch').value||'').trim().toLowerCase();var list=dishes.filter(function(d){return!q||d.name.toLowerCase().indexOf(q)!==-1;}).sort(function(a,b){return a.name.localeCompare(b.name);});if(!list.length){document.getElementById('pickerList').innerHTML='<div class="search-empty" style="padding:40px 20px"><p style="color:var(--text-muted);font-size:14px">No dishes match your search</p></div>';return;}document.getElementById('pickerList').innerHTML=list.map(function(d){var ph=latestPhoto(d);return'<div class="picker-row" onclick="selectCookAgain(\''+d.id+'\')">'+(ph?'<img class="picker-thumb" src="'+ph+'">':'<div class="picker-thumb-empty">'+typeEmoji(d.type)+'</div>')+'<div class="picker-info"><div class="pi-name">'+escHtml(d.name)+'</div><div class="pi-meta">'+(d.type||'')+(d.category?' \u00b7 '+d.category:'')+'</div></div></div>';}).join('');}
function selectCookAgain(id){closeOverlay('cookPickerOverlay');cookAgainId=id;cookAgainPhoto=null;var d=dishes.find(function(x){return x.id===id;});document.getElementById('cookFormDish').innerHTML='<div>'+typeEmoji(d.type)+'</div><div><div class="cfd-name">'+escHtml(d.name)+'</div><div class="cfd-meta">'+(d.type||'')+(d.category?' \u00b7 '+d.category:'')+'</div></div>';document.getElementById('cookDate').value=todayStr();document.getElementById('cookNotes').value='';populateList('cookIngredientsList',d.ingredients||[],false);populateList('cookStepsList',d.steps||[],true);renderCookPhotoPreview();setTimeout(function(){openOverlay('cookFormOverlay');},400);}

function handleCookPhoto(input){var file=input.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(e){var img=new Image();img.onload=function(){var c=document.createElement('canvas');var MAX=800;var w=img.width,h=img.height;if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);cookAgainPhoto=c.toDataURL('image/jpeg',.75);renderCookPhotoPreview();};img.src=e.target.result;};reader.readAsDataURL(file);}
function renderCookPhotoPreview(){var el=document.getElementById('cookPhotoUpload');el.innerHTML=cookAgainPhoto?'<img src="'+cookAgainPhoto+'" alt="Preview"><button class="remove-photo" onclick="event.stopPropagation();cookAgainPhoto=null;document.getElementById(\'cookPhotoInput\').value=\'\';renderCookPhotoPreview()">\u2715</button>':'<div class="upload-icon">&#x1F4F7;</div><div class="upload-text">Tap to add a photo</div>';}
function saveCookAgain(){if(!cookAgainId)return;var d=dishes.find(function(x){return x.id===cookAgainId;});if(!d)return;d.ingredients=getListValues('cookIngredientsList');d.steps=getListValues('cookStepsList');d.cookLog.push({id:crypto.randomUUID(),date:document.getElementById('cookDate').value,photo:cookAgainPhoto,notes:document.getElementById('cookNotes').value.trim()});saveDishesLS();closeOverlay('cookFormOverlay');renderDishes();if(currentTab==='calendar')renderCalendar();}

// Photo (main form)
function handlePhoto(input){var file=input.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(e){var img=new Image();img.onload=function(){var c=document.createElement('canvas');var MAX=800;var w=img.width,h=img.height;if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);currentPhoto=c.toDataURL('image/jpeg',.75);renderPhotoPreview();};img.src=e.target.result;};reader.readAsDataURL(file);}
function renderPhotoPreview(){var el=document.getElementById('photoUpload');el.innerHTML=currentPhoto?'<img src="'+currentPhoto+'" alt="Preview"><button class="remove-photo" onclick="event.stopPropagation();removePhoto()">\u2715</button>':'<div class="upload-icon">&#x1F4F7;</div><div class="upload-text">Tap to add a photo</div>';}
function removePhoto(){currentPhoto=null;document.getElementById('photoInput').value='';renderPhotoPreview();}

// Modal
function openAddModal(){editingId=null;currentPhoto=null;document.getElementById('modalTitle').textContent='New Dish';document.getElementById('dishName').value='';document.getElementById('dishType').value='';document.getElementById('dishCategory').value='';document.getElementById('dishDate').value=todayStr();document.getElementById('dishNotes').value='';document.getElementById('deleteBtn').style.display='none';document.getElementById('saveBtn').textContent='Save Dish';document.getElementById('photoInput').value='';document.querySelectorAll('.cook-only').forEach(function(el){el.style.display='';});populateIngredients([]);populateSteps([]);renderPhotoPreview();openOverlay('modalOverlay');}
function openEditModal(id){var d=dishes.find(function(x){return x.id===id;});if(!d)return;editingId=id;currentPhoto=null;document.getElementById('modalTitle').textContent='Edit Recipe';document.getElementById('dishName').value=d.name;document.getElementById('dishType').value=d.type;document.getElementById('dishCategory').value=d.category||'';document.getElementById('deleteBtn').style.display='block';document.getElementById('saveBtn').textContent='Update Recipe';document.querySelectorAll('.cook-only').forEach(function(el){el.style.display='none';});populateIngredients(d.ingredients||[]);populateSteps(d.steps||[]);openOverlay('modalOverlay');}
function saveDish(){var name=document.getElementById('dishName').value.trim();var type=document.getElementById('dishType').value;var category=document.getElementById('dishCategory').value;var date=document.getElementById('dishDate').value;var ingredients=getIngredients();var steps=getSteps();var notes=document.getElementById('dishNotes').value.trim();if(!name){document.getElementById('dishName').focus();return;}if(editingId){var d=dishes.find(function(x){return x.id===editingId;});if(d){d.name=name;d.type=type;d.category=category;d.ingredients=ingredients;d.steps=steps;}}else{dishes.push({id:crypto.randomUUID(),name:name,type:type,category:category,ingredients:ingredients,steps:steps,cookLog:[{id:crypto.randomUUID(),date:date,photo:currentPhoto,notes:notes}],created:Date.now()});}saveDishesLS();closeOverlay('modalOverlay');closeDetail();renderDishes();if(currentTab==='calendar')renderCalendar();}
function deleteDish(){if(!editingId||!confirm('Delete this dish and all its cook history?'))return;dishes=dishes.filter(function(d){return d.id!==editingId;});saveDishesLS();closeOverlay('modalOverlay');closeDetail();renderDishes();if(currentTab==='calendar')renderCalendar();}

// Dishes View
function setFilterMode(m){filterMode=m;activeFilter='All';document.getElementById('filterToggle').querySelectorAll('button').forEach(function(b){b.classList.toggle('active',b.textContent.toLowerCase()===m);});renderDishes();}
function renderDishes(){var ff=filterMode==='meal'?'type':'category';var filtered=activeFilter==='All'?dishes:dishes.filter(function(d){return d[ff]===activeFilter;});document.getElementById('dishCount').textContent=dishes.length+' dish'+(dishes.length!==1?'es':'');var vals=['All'].concat(Array.from(new Set(dishes.map(function(d){return d[ff];}).filter(Boolean))));document.getElementById('filters').innerHTML=vals.map(function(t){return'<button class="pill '+(t===activeFilter?'active':'')+'" onclick="setFilter(\''+t.replace(/'/g,"\\'")+'\')">'+t+'</button>';}).join('');var grid=document.getElementById('grid');if(!filtered.length){grid.innerHTML='<div class="empty"><div class="empty-icon">\u{1F373}</div><h2>'+(dishes.length===0?'Start Cooking':'No '+activeFilter+' dishes yet')+'</h2><p>'+(dishes.length===0?'Tap + to log your first dish':'Try a different filter or add a new dish')+'</p></div>';return;}

// Calendar
function renderCalendar(){var mn=['January','February','March','April','May','June','July','August','September','October','November','December'];document.getElementById('calTitle').textContent=mn[calMonth]+' '+calYear;var fd=new Date(calYear,calMonth,1).getDay();var di=new Date(calYear,calMonth+1,0).getDate();var today=todayStr();var dm={};dishes.forEach(function(d){d.cookLog.forEach(function(c){if(!c.date)return;if(!dm[c.date])dm[c.date]=[];dm[c.date].push({dish:d,cook:c});});});var h='';for(var i=0;i<fd;i++)h+='<div class="cal-day empty"></div>';for(var day=1;day<=di;day++){var ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');var dd=dm[ds]||[];var isT=ds===today;var has=dd.length>0;var mx=4;var th='';if(has){th='<div class="cal-thumbs">'+dd.slice(0,mx).map(function(e){return e.cook.photo?'<img class="cal-thumb" src="'+e.cook.photo+'">':'<div class="cal-thumb-emoji">'+typeEmoji(e.dish.type)+'</div>';}).join('')+'</div>';if(dd.length>mx)th+='<div class="cal-more">+'+(dd.length-mx)+'</div>';}h+='<div class="cal-day'+(isT?' today':'')+(has?' has-dishes':'')+'" '+(has?'onclick="openDayPanel(\''+ds+'\')"':'')+'><span class="day-num">'+day+'</span>'+th+'</div>';}document.getElementById('calGrid').innerHTML=h;}

// Search (fuzzy)
function levenshtein(a,b){var m=a.length,n=b.length;if(!m)return n;if(!n)return m;var d=[];for(var i=0;i<=m;i++)d[i]=[i];for(var j=0;j<=n;j++)d[0][j]=j;for(var i=1;i<=m;i++)for(var j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));return d[m][n];}
function fuzzyMatchWords(q,text){var tl=text.toLowerCase();if(tl.indexOf(q)!==-1)return{exact:true,matched:text};if(q.length<3)return null;var words=tl.split(/[\s,;\/\-]+/).filter(Boolean);var maxD=q.length<=3?1:q.length<=6?2:3;for(var i=0;i<words.length;i++){var w=words[i];if(levenshtein(q,w)<=maxD)return{exact:false,matched:text};if(w.length>q.length&&levenshtein(q,w.substring(0,q.length))<=maxD)return{exact:false,matched:text};}return null;}
function searchField(q,val){if(!val)return null;if(typeof val==='string')return fuzzyMatchWords(q,val);for(var i=0;i<val.length;i++){var r=fuzzyMatchWords(q,val[i]);if(r)return{exact:r.exact,matched:val[i]};}return null;}
function runSearch(){var q=document.getElementById('searchInput').value.trim().toLowerCase();document.getElementById('searchClear').classList.toggle('show',q.length>0);var res=document.getElementById('searchResults');if(!q){res.innerHTML='<div class="search-empty"><div class="search-empty-icon">&#x1F50D;</div><p>Search by dish name, category,<br>ingredients, or meal type</p></div>';return;}var scored=[];dishes.forEach(function(d){var score=0,ml='';var r=searchField(q,d.name);if(r){score+=r.exact?4:2;ml='Name match';}r=searchField(q,d.category);if(r){score+=r.exact?3:1.5;if(!ml)ml='Category: '+d.category;}r=searchField(q,d.ingredients);if(r){score+=r.exact?2:1;if(!ml)ml='Ingredient: '+r.matched;}r=searchField(q,d.type);if(r){score+=r.exact?1:.5;if(!ml)ml='Meal: '+d.type;}if(score>0)scored.push({dish:d,score:score,ml:ml});});scored.sort(function(a,b){return b.score-a.score||a.dish.name.localeCompare(b.dish.name);});if(!scored.length){res.innerHTML='<div class="search-empty"><div class="search-empty-icon">&#x1F645;</div><p>No dishes match &ldquo;'+escHtml(q)+'&rdquo;</p></div>';return;}res.innerHTML=scored.map(function(s){var d=s.dish;var ph=latestPhoto(d);return'<div class="search-row" onclick="openDetail(\''+d.id+'\')">'+(ph?'<img class="search-row-thumb" src="'+ph+'">':'<div class="search-row-thumb-empty">'+typeEmoji(d.type)+'</div>')+'<div class="search-row-info"><div class="sr-name">'+escHtml(d.name)+'</div><div class="sr-meta">'+(d.type||'')+(d.category?' \u00b7 '+d.category:'')+'</div><div class="sr-match">'+escHtml(s.ml)+'</div></div></div>';}).join('');}
function clearSearch(){document.getElementById('searchInput').value='';document.getElementById('searchClear').classList.remove('show');runSearch();document.getElementById('searchInput').focus();}
